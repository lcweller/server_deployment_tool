# GameServerOS / Steamline host — kernel network and process hardening (internet-facing game server).
# Applied by the agent on Linux (root) to /etc/sysctl.d/ via linux-hardening.ts

# SYN flood protection — enable SYN cookies so the kernel can answer legitimate clients under SYN flood.
net.ipv4.tcp_syncookies = 1

# Source address verification — drop packets whose source IP cannot arrive on this interface (anti-spoofing).
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable ICMP redirects — prevents attackers from redirecting traffic through malicious gateways.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Do not send ICMP redirects — this host is not a router; sending redirects aids traffic redirection attacks.
net.ipv4.conf.all.send_redirects = 0

# Disable IP forwarding — appliance is not a router; reduces lateral movement if compromised.
net.ipv4.ip_forward = 0

# ASLR — full randomization of memory layout for user processes.
kernel.randomize_va_space = 2

# Disable core dumps for setuid binaries — limits leakage of privileged memory.
fs.suid_dumpable = 0

# Increase max queued SYN backlog for burst resistance under load.
net.ipv4.tcp_max_syn_backlog = 8192

# Limit SYN-ACK retries — reduces half-open connection retention during floods.
net.ipv4.tcp_synack_retries = 3

# Conntrack table size for moderate connection counts under attack.
net.netfilter.nf_conntrack_max = 262144

# Established TCP timeout — stale connections clear faster under volumetric events.
net.netfilter.nf_conntrack_tcp_timeout_established = 43200

# TIME-WAIT socket pressure — shorter FIN timeout for busy game hosts.
net.ipv4.tcp_fin_timeout = 15
