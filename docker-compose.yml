services:
  postgres:
    image: postgres:16-alpine
    container_name: steamline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: steamline
      POSTGRES_PASSWORD: steamline
      POSTGRES_DB: steamline
    ports:
      - "5432:5432"
    volumes:
      - steamline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steamline -d steamline"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: steamline-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  steamline_pgdata:
